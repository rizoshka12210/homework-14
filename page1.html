<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
</head>
<body>
   


  <header class="w-full">
    <div class="max-w-7xl mx-auto px-10 py-6 flex items-center justify-between">


      <div class="flex items-center gap-3">
        <img src="./photo/_2243895274448.png" alt="logo">
      </div>


      <nav class="hidden lg:flex items-center gap-8 text-sm text-gray-700">
        <a href="#" class="hover:text-black">Как покупать</a>
        <a href="#" class="hover:text-black">Распродажи</a>
        <a href="#" class="hover:text-black">Цены</a>
        <a href="#" class="hover:text-black">Помощь</a>
        <a href="#" class="hover:text-black">Бонусы</a>
        <a href="#" class="hover:text-black">Блог</a>
        <a href="#" class="hover:text-black">Магазины</a>
      </nav>


      <div class="flex items-center gap-6">
        <button class="flex items-center gap-2 text-sm text-gray-700 hover:text-black">
          <img src="./photo/User.png" alt="">
          Вход
        </button>

        <button class="bg-green-500 hover:bg-green-600 text-white text-sm px-6 py-3 rounded-full shadow-md">
          Связаться с нами
        </button>
      </div>

    </div>
  </header>



  <section class="py-10">
    <div class="max-w-7xl mx-auto px-10">

      <div
        class="rounded-[40px] border-[3px] border-blue-500 overflow-hidden
               bg-gradient-to-r from-[#5B63C9] to-[#2DB9E8]
               shadow-lg"
      >
        <div class="grid lg:grid-cols-2 items-center min-h-[520px] px-16 py-14">


          <div class="text-white">
            <h1 class="text-5xl font-extrabold leading-tight mb-8">
              Доставка товаров <br>
              из Великобритании <br>
              в Россию
            </h1>

            <p class="text-white/80 text-sm leading-relaxed max-w-md mb-10">
              Начните экономить до 80% на шопинге. Регистрируйтесь в OkeyPost,
              чтобы покупать со скидками в UK одежду, обувь, гаджеты известных
              брендов и безопасно отправлять вещи в Россию.
            </p>

            <button
              class="bg-green-500 hover:bg-green-600 text-white text-sm font-semibold
                     px-8 py-4 rounded-full shadow-lg"
            >
              Получить адрес в UK
            </button>
          </div>


          <div class="flex justify-center lg:justify-end">
            <img
              src="./photo/Иллюстрация.png"
              class="w-[420px] lg:w-[520px] object-contain"
              alt="hero"
            >
          </div>

        </div>
      </div>

    </div>
  </section>
</body>
</html>
